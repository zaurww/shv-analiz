<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şəxsi Hesab Analizi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:        #0f1117;
    --bg2:       #161b27;
    --bg3:       #1e2535;
    --border:    #2a3347;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --accent:    #3b82f6;
    --accent2:   #1d4ed8;
    --green:     #10b981;
    --green-bg:  #052e16;
    --red:       #ef4444;
    --red-bg:    #2d0a0a;
    --yellow:    #f59e0b;
    --yellow-bg: #2d1f02;
    --purple:    #a855f7;
    --purple-bg: #1e0a2e;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .header h1 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .header p { font-size: 12px; color: var(--muted); margin-top: 1px; }

  /* ── DROP ZONE ── */
  #drop-section {
    padding: 60px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .drop-zone {
    width: 100%; max-width: 560px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg2);
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: #1a2540;
  }
  .drop-icon { font-size: 40px; margin-bottom: 12px; }
  .drop-zone h2 { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
  .drop-zone p  { font-size: 13px; color: var(--muted); }
  .drop-zone input { display: none; }
  .btn-upload {
    display: inline-block;
    margin-top: 16px;
    padding: 8px 20px;
    background: var(--accent);
    color: #fff;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: background 0.2s;
  }
  .btn-upload:hover { background: var(--accent2); }

  /* ── RESULTS ── */
  #results { display: none; padding: 24px 32px 48px; }

  .company-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }
  .company-name  { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--accent); }
  .company-voen  { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .company-period { font-size: 12px; color: var(--muted); text-align: right; }

  /* ── CHIPS ── */
  .summary-row { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
  .chip {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    flex: 1;
    min-width: 140px;
  }
  .chip-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .chip-value { font-family: var(--mono); font-size: 18px; font-weight: 600; margin-top: 4px; }
  .chip-value.warn   { color: var(--yellow); }
  .chip-value.danger { color: var(--red); }
  .chip-value.ok     { color: var(--green); }
  .chip-value.info   { color: var(--purple); }

  /* ── ALERTS ── */
  .alert {
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 14px;
    font-size: 13px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .alert .icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .alert-kyb  { background: #1c1408; border: 1px solid #92400e; color: var(--yellow); }
  .alert-syb  { background: #1a0a2e; border: 1px solid #6b21a8; color: var(--purple); }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    margin-top: 28px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* ── TABLE ── */
  .table-wrap {
    overflow-x: auto;
    overflow-y: auto;
    max-height: calc(100vh - 320px);
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: var(--bg3);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 8px 12px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  thead tr:first-child th { top: 0;    z-index: 11; }
  thead tr:last-child  th { top: 31px; z-index: 10; }
  thead th:first-child { text-align: left; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:hover { background: var(--bg3); }
  tbody td { padding: 9px 12px; text-align: right; font-family: var(--mono); font-size: 12px; }
  tbody td:first-child { text-align: left; font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--text); }
  .num-pos  { color: var(--text); }
  .num-neg  { color: var(--red); }
  .num-zero { color: var(--muted); }

  /* ── BADGES ── */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 500;
    font-family: var(--mono); white-space: nowrap;
  }
  .badge-red    { background: var(--red-bg);    color: var(--red);    border: 1px solid #7f1d1d; }
  .badge-yellow { background: var(--yellow-bg); color: var(--yellow); border: 1px solid #78350f; }
  .badge-green  { background: var(--green-bg);  color: var(--green);  border: 1px solid #14532d; }
  .badge-purple { background: var(--purple-bg); color: var(--purple); border: 1px solid #6b21a8; }
  .badge-muted  { background: var(--bg3);       color: var(--muted);  border: 1px solid var(--border); }

  /* ── BUTTONS ── */
  .action-row { display: flex; gap: 10px; margin-top: 28px; flex-wrap: wrap; }
  .btn {
    padding: 9px 18px; border-radius: 6px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; border: none;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.2s;
  }
  .btn-primary   { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }

  /* ── SPINNER & ERROR ── */
  .spinner {
    display: none; width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    background: var(--red-bg); border: 1px solid #7f1d1d;
    border-radius: 8px; padding: 12px 16px; color: var(--red);
    font-size: 13px; margin-top: 12px; display: none;
  }
  .tab-btn {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border); background: var(--bg3);
    color: var(--muted); font-family: var(--sans); transition: all 0.2s; white-space: nowrap;
  }
  .tab-btn:hover { background: var(--border); color: var(--text); }
  .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📊</div>
  <div>
    <h1>ŞƏXSİ HESAB ANALİZATORU</h1>
    <p>Vergi portalından yüklənmiş XLS faylı ilə işləyir</p>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="tab-btn active" id="tabShv" onclick="switchTab('shv')">📋 Şəxsi Hesab</button>
    <button class="tab-btn" id="tabXml" onclick="switchTab('xml')">📄 MV Bəyannaməsi XML</button>
  </div>
</div>

<div id="tab-shv">
<div id="drop-section">
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">📂</div>
    <h2>XLS faylını buraya atın</h2>
    <p>Vergi portalından yüklənmiş şəxsi hesab vərəqəsi (.xls)</p>
    <label class="btn-upload">
      Fayl seçin
      <input type="file" id="fileInput" accept=".xls,.html,.htm">
    </label>
  </div>
  <div class="spinner" id="spinner"></div>
  <div class="error-box" id="errorBox"></div>
</div>
<div id="results"></div>
</div>

<div id="tab-xml" style="display:none;">
<div id="xml-drop-section" style="padding:60px 32px;display:flex;flex-direction:column;align-items:center;gap:24px;">
  <div class="drop-zone" id="xmlDropZone">
    <div class="drop-icon">🗂️</div>
    <h2>MV Bəyannaməsi XML faylını yükləyin</h2>
    <p>Portaldakı "XML endir" ilə yüklənmiş MENFEET_1 faylı</p>
    <label class="btn-upload">
      XML seçin
      <input type="file" id="xmlFileInput" accept=".xml">
    </label>
  </div>
  <div class="spinner" id="xmlSpinner"></div>
  <div class="error-box" id="xmlErrorBox"></div>
</div>
<div id="xml-results" style="display:none;padding:24px 32px 48px;"></div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// SECTION 1 — CONSTANTS & CONFIG
// ═══════════════════════════════════════════════════════════════

const TAX_ORDER = ['MV', 'ƏDVQR', 'ƏDV', 'ÖMV', 'HŞƏV', 'VAHID MUZDLU'];

// Declaration patterns that count as filed returns (Ödəniş excluded via opType check)
// CARİ(ARAYIS) is intentionally excluded
const DECL_PATTERN = /CARİ\(B\)|DƏQİQLƏŞMİŞ\(B\)|DƏQİQLƏŞDİRİLMİŞ\(B\)/;

// ═══════════════════════════════════════════════════════════════
// SECTION 2 — FILE I/O
// ═══════════════════════════════════════════════════════════════

function initDropZone() {
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });
}

function handleFile(file) {
  ui.showSpinner(true);
  ui.hideError();
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const html = e.target.result;
      const data = Parser.parse(html);
      Renderer.render(data);
      // store for XLSX export
      window._analysisData = data;
    } catch (err) {
      ui.showError('Fayl oxunarkən xəta baş verdi: ' + err.message);
      console.error(err);
    }
    ui.showSpinner(false);
  };
  reader.onerror = () => {
    ui.showError('Fayl oxuna bilmədi.');
    ui.showSpinner(false);
  };
  reader.readAsText(file, 'iso-8859-1');
}

// ═══════════════════════════════════════════════════════════════
// SECTION 3 — PARSER
// Responsibility: raw HTML → structured AnalysisData object
// ═══════════════════════════════════════════════════════════════

const Parser = (() => {

  // ── 3.1 Entry point ──────────────────────────────────────────
  function parse(html) {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const companyInfo = extractCompanyInfo(doc);
    const summaryData = extractSummaryTable(doc);
    const rawRows     = extractRawRows(doc);
    const taxMap      = buildTaxMap(rawRows);
    const taxes       = finalizeTaxes(taxMap);

    return {
      ...companyInfo,
      period:    summaryData['Əhatə etdiyi dövr']  || '',
      printDate: summaryData['Çap olunma tarixi']  || '',
      totalDebt: parseAmount(summaryData['Cəmi ödənməli borc'] || '0'),
      taxes,
      kybActive:    taxes.filter(t => t.kyb_status === 'active'),
      kybCancelled: taxes.filter(t => t.kyb_status === 'cancelled'),
      sybActive:    taxes.filter(t => t.syb_status === 'active'),
      sybCancelled: taxes.filter(t => t.syb_status === 'cancelled'),
      rawRows,
    };
  }

  // ── 3.2 Extract company name & VÖEN ──────────────────────────
  function extractCompanyInfo(doc) {
    let companyRaw = '';
    for (const b of doc.querySelectorAll('b')) {
      const t = b.textContent.trim();
      if (t.includes('VÖEN') || t.length > 10) { companyRaw = t; break; }
    }
    const voenMatch  = companyRaw.match(/VÖEN[:\s]*(\d+)/);
    const voen       = voenMatch ? voenMatch[1] : '';
    const companyName = companyRaw
      .replace(/\(VÖEN[^)]*\)/, '')
      .replace(/VÖEN[:\s]*\d+/, '')
      .trim().replace(/\s+/g, ' ');
    return { companyName, voen };
  }

  // ── 3.3 Extract summary key-value table (last table) ─────────
  function extractSummaryTable(doc) {
    const tables = doc.querySelectorAll('table');
    const summaryTable = tables[tables.length - 1];
    const result = {};
    if (!summaryTable) return result;
    for (const row of summaryTable.querySelectorAll('tr')) {
      const cells = [...row.querySelectorAll('td')].map(td => td.textContent.trim());
      if (cells.length >= 2 && cells[0]) result[cells[0]] = cells[1];
    }
    return result;
  }

  // ── 3.4 Find tax table and extract raw rows ───────────────────
  function extractRawRows(doc) {
    const taxTable = findTaxTable(doc);
    if (!taxTable) throw new Error('Vergi cədvəli tapılmadı');

    const headerRow = taxTable.querySelector('tr');
    const headers   = [...headerRow.querySelectorAll('td')].map(td => td.textContent.trim());

    // Dynamically find "Miqdar (Manat)" column index (handles extra columns like "Miqdar (ABŞ$)")
    let amountIdx = headers.findIndex(h => h.includes('Miqdar') && h.includes('Manat'));
    if (amountIdx === -1) amountIdx = 4; // fallback

    const rows = [...taxTable.querySelectorAll('tr')].slice(1);
    const result = [];
    for (const row of rows) {
      const cells = [...row.querySelectorAll('td')].map(td => td.textContent.trim());
      if (cells.length < 5) continue;
      result.push({
        date:    cells[0],
        opName:  cells[1],
        opType:  cells[2], // Hesablama | Azalma | Ödəniş
        col3:    cells[3],
        amount:  parseAmount(cells[amountIdx]),
      });
    }
    return result;
  }

  function findTaxTable(doc) {
    for (const t of doc.querySelectorAll('table')) {
      const firstRow = t.querySelector('tr');
      if (!firstRow) continue;
      const headers = [...firstRow.querySelectorAll('td')].map(td => td.textContent.trim());
      if (
        headers.includes('Yazılış tarixi') &&
        headers.includes('Əməliyyat adı') &&
        headers.includes('Miqdar (Manat)')
      ) return t;
    }
    return null;
  }

  // ── 3.5 Build aggregated tax map ─────────────────────────────
  function buildTaxMap(rawRows) {
    const taxMap = {};

    for (const r of rawRows) {
      const { opName, opType, amount, date } = r;
      if (!opName || !opType) continue;

      const key  = extractTaxKey(opName);
      if (key === 'Diger') continue;

      const isKyb  = opName.includes('KYB');
      const isKybl = opName.includes('KYBL');
      // SYB only if KYB is NOT present (per spec)
      const isSyb  = opName.includes('SYB') && !isKyb;

      if (!taxMap[key]) taxMap[key] = newTaxEntry(key);
      const entry = taxMap[key];

      // ── Accumulate amounts by category ──────────────────────
      if (isKyb) {
        entry.has_kyb = true;
        // KYBL = ləğv azalması — always to kyb_azalma regardless of opType
        if (isKybl) {
          entry.has_kybl = true;
          entry.kyb_azalma += amount;
        } else {
          if (opType === 'Hesablama') entry.kyb_hesablama += amount;
          else if (opType === 'Azalma') entry.kyb_azalma += amount;
        }
      } else if (isSyb) {
        entry.has_syb = true;
        if (opType === 'Hesablama') entry.syb_hesablama += amount;
        else if (opType === 'Azalma') entry.syb_azalma += amount;
      } else {
        if (opType === 'Hesablama') entry.hesablama += amount;
        else if (opType === 'Azalma') entry.azalma += amount;

        // ── Declaration counting ─────────────────────────────
        // Count real declarations:
        // - Slash-free rows (e.g. "MV 2024 - DƏQİQLƏŞMİŞ(B)") = submitted by client → COUNT each one
        // - "/N" rows (e.g. "MV 2024 - DƏQİQLƏŞMİŞ(B) / 1") = auto-generated avans corrections → SKIP
        // - VAHID MUZDLU: portal emits 3 rows per quarter (one per month), deduplicate by date+type
        const isSlashRow = /\/\s*\d+\s*$/.test(opName);
        if (DECL_PATTERN.test(opName) && opType !== 'Ödəniş' && !isSlashRow) {
          if (key.startsWith('VAHID MUZDLU')) {
            const declTypeMatch = opName.match(DECL_PATTERN);
            if (declTypeMatch) entry.vahidDates.add(`${date}|${declTypeMatch[0]}`);
          } else {
            entry.decl_count++;
          }
        }
      }
    }

    return taxMap;
  }

  function newTaxEntry(key) {
    return {
      key,
      hesablama: 0, azalma: 0,
      kyb_hesablama: 0, kyb_azalma: 0, has_kyb: false, has_kybl: false,
      syb_hesablama: 0, syb_azalma: 0, has_syb: false,
      decl_count:  0,            // real declarations submitted by client (slash-free rows only)
      vahidDates:  new Set(),   // for VAHID MUZDLU deduplication
    };
  }

  // ── 3.6 Compute derived fields & status ──────────────────────
  function finalizeTaxes(taxMap) {
    for (const t of Object.values(taxMap)) {
      // KYB
      t.kyb_net    = t.kyb_hesablama - t.kyb_azalma;
      t.kyb_status = !t.has_kyb ? 'none' : t.kyb_net <= 0 ? 'cancelled' : 'active';

      // SYB
      t.syb_net    = t.syb_hesablama - t.syb_azalma;
      t.syb_status = !t.has_syb ? 'none' : t.syb_net <= 0 ? 'cancelled' : 'active';

      // Client
      t.client_net = t.hesablama - t.azalma;

      // Totals
      t.total_hesablama = t.hesablama + t.kyb_hesablama + t.syb_hesablama;
      t.total_azalma    = t.azalma    + t.kyb_azalma    + t.syb_azalma;
      t.total_net       = t.total_hesablama - t.total_azalma;

      // Declaration count: already accumulated as decl_count (slash-free rows only)
      t.decl_count = t.key.startsWith('VAHID MUZDLU')
        ? t.vahidDates.size
        : t.decl_count;
    }

    return Object.values(taxMap)
      .filter(t => t.total_net !== 0 || t.has_kyb || t.has_syb)
      .sort((a, b) => taxSortKey(a.key).localeCompare(taxSortKey(b.key)));
  }

  // ── 3.7 extractTaxKey — maps opName → canonical period key ───
  function extractTaxKey(op) {
    op = op.trim();

    // Payments — skip entirely
    if (/^(Ödəmə tapşırığı|Sərəncam)\b/.test(op)) return 'Diger';

    let m;

    // ƏDVQR YYYY/MM  (must check before ƏDV)
    m = op.match(/^(ƏDVQR\s+\d{4}\/\d{2})/);
    if (m) return m[1];

    // ƏDV YYYY/MM
    m = op.match(/^(ƏDV\s+\d{4}\/\d{2})/);
    if (m) return m[1];

    // ÖMV YYYY N.? Rüb
    m = op.match(/^(ÖMV\s+\d{4}\s+\d+\.?\s*Rüb)/);
    if (m) return m[1].replace(/\s+/g, ' ').trim();

    // VAHID MUZDLU YYYY N.? Rüb
    m = op.match(/^(VAHID MUZDLU\s+\d{4}\s+\d+\.?\s*Rüb)/);
    if (m) return m[1].replace(/\s+/g, ' ').trim();

    // ƏV - N.Rüb YYYY → HŞƏV - YYYY  (quarterly avans)
    m = op.match(/^ƏV\s*[-–]\s*\d+\.?\s*Rüb\s+(\d{4})/);
    if (m) return `HŞƏV - ${m[1]}`;

    // HŞƏV YYYY → HŞƏV - YYYY
    m = op.match(/^HŞƏV\s+(\d{4})/);
    if (m) return `HŞƏV - ${m[1]}`;

    // MV (mənfəət vergisi) — starts with "MV" but not "ÖMV"
    m = op.match(/^MV[\s\-]/);
    if (m) {
      const yr = op.match(/(\d{4})/);
      return yr ? `MV - ${yr[1]}` : 'Diger';
    }

    // ── Universal fallback ─────────────────────────────────────

    // TAX YYYY/MM
    m = op.match(/^([A-ZƏÜÖĞIİŞÇ][A-ZƏÜÖĞIİŞÇ\s]{0,20}?)\s+(\d{4}\/\d{2})\b/);
    if (m) return `${m[1].trim()} ${m[2]}`;

    // TAX YYYY N. Rüb
    m = op.match(/^([A-ZƏÜÖĞIİŞÇ][A-ZƏÜÖĞIİŞÇ\s]{0,20}?)\s+(\d{4})\s+\d+\.?\s*Rüb/);
    if (m) {
      const qm = op.match(/(\d+)\.?\s*Rüb/);
      return `${m[1].trim()} ${m[2]} ${qm[1]}. Rüb`;
    }

    // TAX YYYY (annual)
    m = op.match(/^([A-ZƏÜÖĞIİŞÇ][A-ZƏÜÖĞIİŞÇ\s]{0,20}?)\s+(\d{4})\b/);
    if (m) return `${m[1].trim()} - ${m[2]}`;

    return 'Diger';
  }

  // ── 3.8 Sort key ──────────────────────────────────────────────
  function taxSortKey(key) {
    for (let i = 0; i < TAX_ORDER.length; i++) {
      if (key.startsWith(TAX_ORDER[i])) {
        const yr   = key.match(/(\d{4})/);
        const mo   = key.match(/\/(\d{2})/);
        const rub  = key.match(/(\d+)\.\s*Rüb/);
        const year  = yr  ? parseInt(yr[1])  : 9999;
        const month = mo  ? parseInt(mo[1])  : rub ? parseInt(rub[1]) * 3 : 0;
        return `${String(i).padStart(2,'0')}_${year}_${String(month).padStart(2,'0')}_${key}`;
      }
    }
    return `99_${key}`;
  }

  // ── 3.9 Amount parser ─────────────────────────────────────────
  // Handles "8.415,00" (AZ/DE locale) → 8415.00
  function parseAmount(s) {
    if (!s) return 0;
    s = s.trim();
    return parseFloat(s.replace(/\./g, '').replace(',', '.')) || 0;
  }

  return { parse };
})();

// SECTION 4 — RENDERER
// Responsibility: AnalysisData → DOM
// ═══════════════════════════════════════════════════════════════

const Renderer = (() => {

  function render(data) {
    document.getElementById('drop-section').style.display = 'none';
    const el = document.getElementById('results');
    el.style.display = 'block';
    el.innerHTML = buildResultsHTML(data);
  }

  // ── 4.1 Top-level HTML assembly ───────────────────────────────
  function buildResultsHTML(data) {
    const { kybActive, kybCancelled, sybActive, sybCancelled } = data;
    const kybTotal = kybActive.reduce((s, t) => s + t.kyb_net, 0);
    const sybTotal = sybActive.reduce((s, t) => s + t.syb_net, 0);
    const debtClass = data.totalDebt > 0 ? 'danger' : 'ok';

    return `
      ${companyCardHTML(data)}
      ${alertsHTML(kybActive, kybTotal, sybActive, sybTotal)}
      ${chipsHTML(data, kybActive, kybTotal, sybActive, sybTotal, debtClass)}
      <div class="section-title">Vergilər üzrə analiz</div>
      <div class="table-wrap">${taxTableHTML(data.taxes)}</div>

      <div class="action-row">
        <button class="btn btn-primary" onclick="XlsxExport.download(window._analysisData)">⬇ XLSX yüklə</button>
        <button class="btn btn-secondary" onclick="location.reload()">↩ Yeni fayl</button>
      </div>
    `;
  }

  // ── 4.2 Company card ──────────────────────────────────────────
  function companyCardHTML(data) {
    return `
      <div class="company-card">
        <div>
          <div class="company-name">${esc(data.companyName)}</div>
          <div class="company-voen">VÖEN: ${esc(data.voen)}</div>
        </div>
        <div class="company-period">
          <div>Çap tarixi: ${esc(data.printDate)}</div>
          <div style="margin-top:2px">Dövr: ${esc(data.period)}</div>
        </div>
      </div>`;
  }

  // ── 4.3 Alert boxes ───────────────────────────────────────────
  function alertsHTML(kybActive, kybTotal, sybActive, sybTotal) {
    let html = '';
    if (kybActive.length > 0) {
      const names = kybActive.map(t => `<b>${esc(t.key)}</b>`).join(', ');
      const total = fmt(kybTotal).replace(/<[^>]+>/g, '');
      html += `
        <div class="alert alert-kyb">
          <span class="icon">⚠️</span>
          <div>
            <b>Aktiv kameral yoxlama (KYB) aşkar edildi!</b><br>
            ${names} üzrə cəmi <b>${fmtRaw(kybTotal)} ₼</b> məbləğində kameral başlama var.
            Vergi ödəyicisi məlumatlandırılıbmı?
          </div>
        </div>`;
    }
    if (sybActive.length > 0) {
      const names = sybActive.map(t => `<b>${esc(t.key)}</b>`).join(', ');
      html += `
        <div class="alert alert-syb">
          <span class="icon">🔍</span>
          <div>
            <b>Aktiv səyyar yoxlama (SYB) aşkar edildi!</b><br>
            ${names} üzrə cəmi <b>${fmtRaw(sybTotal)} ₼</b> məbləğində səyyar başlama var.
          </div>
        </div>`;
    }
    return html;
  }

  // ── 4.4 Summary chips ─────────────────────────────────────────
  function chipsHTML(data, kybActive, kybTotal, sybActive, sybTotal, debtClass) {
    const chips = [
      { label: 'Cəmi ödənməli borc', value: `${fmtRaw(data.totalDebt)} ₼`, cls: debtClass },
      { label: 'Aktiv KYB sayı',     value: kybActive.length,               cls: kybActive.length > 0 ? 'danger' : 'ok' },
      { label: 'Aktiv KYB məbləği',  value: `${fmtRaw(kybTotal)} ₼`,        cls: kybTotal > 0 ? 'warn' : 'ok' },
      { label: 'Aktiv SYB sayı',     value: sybActive.length,               cls: sybActive.length > 0 ? 'info' : 'ok' },
      { label: 'Aktiv SYB məbləği',  value: `${fmtRaw(sybTotal)} ₼`,        cls: sybTotal > 0 ? 'info' : 'ok' },
      { label: 'Vergi növlərinin sayı', value: data.taxes.length,            cls: '' },
    ];
    return `<div class="summary-row">${
      chips.map(c => `
        <div class="chip">
          <div class="chip-label">${c.label}</div>
          <div class="chip-value ${c.cls}">${c.value}</div>
        </div>`).join('')
    }</div>`;
  }

  // ── 4.5 Main tax table (13 columns) ──────────────────────────
  // Columns: Tax | Decl | Bəy[Hes|Az|Net] | KYB[Hes|Az|Net|St] | SYB[Hes|Az|Net|St] | Cəmi Qalıq
  function taxTableHTML(taxes) {
    const rows = taxes.map(t => {
      const declCell = t.decl_count > 0
        ? `<span style="color:var(--accent);font-weight:600">${t.decl_count}</span>`
        : `<span class="num-zero">—</span>`;
      const clientNet = t.hesablama - t.azalma;
      return `
        <tr>
          <td>${esc(t.key)}</td>
          <td style="text-align:center">${declCell}</td>
          <td>${fmt(t.hesablama)}</td>
          <td>${fmt(t.azalma)}</td>
          <td><b>${fmt(clientNet)}</b></td>
          <td>${fmt(t.kyb_hesablama)}</td>
          <td>${fmt(t.kyb_azalma)}</td>
          <td><b>${fmt(t.kyb_net)}</b></td>
          <td style="text-align:center">${statusBadgeHTML('kyb', t.kyb_status, t.kyb_net)}</td>
          <td>${fmt(t.syb_hesablama)}</td>
          <td>${fmt(t.syb_azalma)}</td>
          <td><b>${fmt(t.syb_net)}</b></td>
          <td style="text-align:center">${statusBadgeHTML('syb', t.syb_status, t.syb_net)}</td>
          <td><b>${fmt(t.total_net)}</b></td>
        </tr>`;
    }).join('');

    const thC = 'style="text-align:center;padding:5px 8px;border-bottom:2px solid"';
    return `
      <table>
        <thead>
          <tr>
            <th rowspan="2" style="vertical-align:middle;text-align:left">Vergi / Dövr</th>
            <th rowspan="2" style="vertical-align:middle">Bəyannamə</th>
            <th colspan="3" style="text-align:center;color:var(--accent);border-bottom:2px solid var(--accent)">Bəyannamə üzrə</th>
            <th colspan="4" style="text-align:center;color:var(--yellow);border-bottom:2px solid var(--yellow)">KYB (Kameral)</th>
            <th colspan="4" style="text-align:center;color:var(--purple);border-bottom:2px solid var(--purple)">SYB (Səyyar)</th>
            <th rowspan="2" style="vertical-align:middle">Cəmi Qalıq</th>
          </tr>
          <tr>
            <th>Hesablama</th>
            <th>Azalma</th>
            <th>Net</th>
            <th>Hesablama</th>
            <th>Azalma</th>
            <th>Net</th>
            <th>Status</th>
            <th>Hesablama</th>
            <th>Azalma</th>
            <th>Net</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ── 4.6 Cancelled inspections table ──────────────────────────
  function cancelledTableHTML(taxes, type) {
    const rows = taxes.map(t => `
      <tr>
        <td>${esc(t.key)}</td>
        <td>${fmt(t[`${type}_hesablama`])}</td>
        <td>${fmt(t[`${type}_azalma`])}</td>
        <td><span class="badge badge-green">✓ Ləğv edilib</span></td>
      </tr>`).join('');
    const label = type.toUpperCase();
    return `
      <table>
        <thead><tr>
          <th>Vergi / Dövr</th>
          <th>${label} Hesablama</th>
          <th>${label} Ləğvi</th>
          <th>Status</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ── 4.7 Status badge ─────────────────────────────────────────
  function statusBadgeHTML(type, status, net) {
    if (status === 'none')      return '<span class="badge badge-muted">—</span>';
    if (status === 'cancelled') return '<span class="badge badge-green">✓ Ləğv</span>';
    // active
    const colorClass = type === 'kyb' ? 'badge-red' : 'badge-purple';
    return `<span class="badge ${colorClass}">⚠ ${fmtRaw(net)}</span>`;
  }

  return { render };
})();


// ═══════════════════════════════════════════════════════════════
// SECTION 5 — XLSX EXPORT
// Responsibility: AnalysisData → ExcelJS workbook → download
// ═══════════════════════════════════════════════════════════════

const XlsxExport = (() => {

  // ── 5.0 Theme palette ────────────────────────────────────────
  const C = {
    bgDark:      'F1F5F9', // чётные строки — светло-серый
    bgMid:       'FFFFFF', // нечётные строки — белый
    bgLight:     'E8F0FE', // фон заголовков
    border:      'CBD5E1', // рамки
    blue:        '1D4ED8', // синий текст
    blueLight:   'DBEAFE', // фон группы Hesablama
    blueDark:    '1E3A6E', // текст в группе Hesablama
    amber:       'B45309', // янтарный текст
    amberLight:  'FEF3C7', // фон группы Azalma
    amberDark:   '78350F', // текст в группе Azalma
    green:       '15803D', // зелёный статус
    greenLight:  'DCFCE7',
    red:         'B91C1C', // красный — долг, KYB
    redDark:     'FEE2E2', // фон активного KYB
    purple:      '7E22CE', // фиолетовый — SYB
    purpleLight: 'F3E8FF',
    purpleDark:  'FAF5FF', // фон активного SYB
    text:        '0F172A', // основной текст — почти чёрный
    muted:       '475569', // вторичный текст
  };

  const NUM_FMT     = '#,##0.00;[Red]-#,##0.00;"-"';
  const NUM_FMT_INT = '#,##0;[Red]-#,##0;"-"';

  const STATUS_LABEL = {
    none:      '—',
    active:    'Aktiv',
    cancelled: 'Ləğv edilib',
  };

  // ── 5.1 Entry point ──────────────────────────────────────────
  async function download(data) {
    const btn = document.querySelector('.btn-primary');
    btn.innerHTML = '⏳ Hazırlanır...';
    btn.disabled = true;

    try {
      const wb = new ExcelJS.Workbook();
      buildSheet1_Analysis(wb, data);
      buildSheet2_Original(wb, data);

      const buffer = await wb.xlsx.writeBuffer();
      const blob   = new Blob([buffer], {
        type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
      });
      const url = URL.createObjectURL(blob);
      Object.assign(document.createElement('a'), {
        href:     url,
        download: `hesab_analiz_${data.voen || 'export'}.xlsx`,
      }).click();
      URL.revokeObjectURL(url);
    } catch (err) {
      alert('XLSX yaradılarkən xəta: ' + err.message);
      console.error(err);
    } finally {
      btn.innerHTML = '⬇ XLSX yüklə';
      btn.disabled  = false;
    }
  }

  // ── 5.2 Sheet 1: Analysis ────────────────────────────────────
  function buildSheet1_Analysis(wb, data) {
    const ws = wb.addWorksheet('Analiz', {
      properties: { tabColor: { argb: 'FF3B82F6' } },
      views: [{ state: 'frozen', ySplit: 7 }],
    });

    // 14 data columns: Tax | Decl | Bəy[Hes,Az,Net] | KYB[Hes,Az,Net,St] | SYB[Hes,Az,Net,St] | CəmiNet
    ws.columns = [
      { width: 32 }, // Tax/Period
      { width: 11 }, // Decl
      { width: 16 }, { width: 16 }, { width: 16 }, // Bəy: Hes, Az, Net
      { width: 15 }, { width: 15 }, { width: 15 }, { width: 18 }, // KYB: Hes, Az, Net, Status
      { width: 15 }, { width: 15 }, { width: 15 }, { width: 18 }, // SYB: Hes, Az, Net, Status
      { width: 16 }, // Cəmi Qalıq
    ];

    const brd  = (style, col) => ({ bottom: { style, color: { argb: 'FF' + (col || C.border) } } });

    // Row 1 — Company name
    ws.mergeCells('A1:N1');
    const r1 = ws.getRow(1); r1.height = 22;
    Object.assign(r1.getCell(1), {
      value: data.companyName,
      font:  xFont(C.text, true, 13),
      fill:  xFill(C.bgMid),
      alignment: { vertical: 'middle' },
    });

    // Row 2 — Meta
    ws.mergeCells('A2:N2');
    const r2 = ws.getRow(2); r2.height = 15;
    Object.assign(r2.getCell(1), {
      value: `VÖEN: ${data.voen}   |   Dövr: ${data.period}   |   Çap tarixi: ${data.printDate}`,
      font:  xFont(C.muted, false, 9),
      fill:  xFill(C.bgMid),
    });

    // Row 3 — KYB alert
    ws.mergeCells('A3:N3');
    const r3 = ws.getRow(3); r3.height = 16;
    if (data.kybActive.length > 0) {
      const tot = data.kybActive.reduce((s, t) => s + t.kyb_net, 0);
      Object.assign(r3.getCell(1), {
        value: `⚠  Aktiv KYB: ${data.kybActive.map(t => t.key).join(', ')}   Cəmi: ${fmtRaw(tot)} ₼`,
        font:  xFont('92400E', true, 10),
        fill:  xFill('FEF3C7'),
      });
    } else {
      r3.getCell(1).fill = xFill(C.bgMid);
    }

    // Row 4 — SYB alert
    ws.mergeCells('A4:N4');
    const r4 = ws.getRow(4); r4.height = 16;
    if (data.sybActive.length > 0) {
      const tot = data.sybActive.reduce((s, t) => s + t.syb_net, 0);
      Object.assign(r4.getCell(1), {
        value: `🔍  Aktiv SYB: ${data.sybActive.map(t => t.key).join(', ')}   Cəmi: ${fmtRaw(tot)} ₼`,
        font:  xFont('6B21A8', true, 10),
        fill:  xFill('F3E8FF'),
      });
    } else {
      r4.getCell(1).fill = xFill(C.bgMid);
    }

    // Row 5 — blank spacer
    ws.mergeCells('A5:N5');
    const r5 = ws.getRow(5); r5.height = 6;
    r5.getCell(1).fill = xFill(C.bgDark);

    // Row 6 — Group headers
    ws.mergeCells('C6:E6');  // Bəyannamə üzrə
    ws.mergeCells('F6:I6');  // KYB
    ws.mergeCells('J6:M6');  // SYB
    const r6 = ws.getRow(6); r6.height = 18;
    for (let c = 1; c <= 14; c++) r6.getCell(c).fill = xFill(C.bgLight);
    [
      [1,  'Vergi / Dövr',    C.bgLight,   C.text],
      [2,  'Bəyannamə',       C.bgLight,   C.text],
      [3,  'Bəyannamə üzrə', C.blueDark,  C.blueLight],
      [6,  'KYB (Kameral)',   C.amberDark, C.amberLight],
      [10, 'SYB (Səyyar)',    '4A1D96',    'EDE9FE'],
      [14, 'Cəmi Qalıq',     C.bgLight,   C.text],
    ].forEach(([col, val, bg, fg]) => {
      Object.assign(r6.getCell(col), {
        value:     val,
        font:      xFont(fg, true, 10),
        fill:      xFill(bg),
        alignment: { horizontal: 'center', vertical: 'middle' },
        border:    brd('medium', C.blue),
      });
    });

    // Row 7 — Sub-headers
    const r7 = ws.getRow(7); r7.height = 15;
    [
      // col: [label, isBlue, isAmber, isPurple]
      ['', false, false, false],           // 1 Tax
      ['', false, false, false],           // 2 Decl
      ['Hesablama', true,  false, false],  // 3
      ['Azalma',    true,  false, false],  // 4
      ['Net',       true,  false, false],  // 5
      ['Hesablama', false, true,  false],  // 6
      ['Azalma',    false, true,  false],  // 7
      ['Net',       false, true,  false],  // 8
      ['Status',    false, true,  false],  // 9
      ['Hesablama', false, false, true],   // 10
      ['Azalma',    false, false, true],   // 11
      ['Net',       false, false, true],   // 12
      ['Status',    false, false, true],   // 13
      ['',          false, false, false],  // 14 Cəmi
    ].forEach(([v, isBlue, isAmber, isPurple], i) => {
      const col = i + 1;
      const bg  = isBlue ? C.blueDark : isAmber ? C.amberDark : isPurple ? '4A1D96' : C.bgMid;
      const fg  = isBlue ? C.blueLight : isAmber ? C.amberLight : isPurple ? 'EDE9FE' : C.muted;
      Object.assign(r7.getCell(col), {
        value:     v,
        font:      xFont(fg, true, 9),
        fill:      xFill(bg),
        alignment: { horizontal: 'center', vertical: 'middle' },
        border:    brd('medium', C.blue),
      });
    });

    // Data rows
    data.taxes.forEach((t, i) => {
      const hasKyb  = t.kyb_hesablama > 0;
      const rowBg   = hasKyb ? (i % 2 === 0 ? 'FFFBEB' : 'FEFCE8') : (i % 2 === 0 ? C.bgDark : C.bgMid);
      const kybBg   = t.kyb_status === 'active' ? C.redDark    : rowBg;
      const sybBg   = t.syb_status === 'active' ? C.purpleDark : rowBg;
      const clientNet = t.hesablama - t.azalma;

      const dr = ws.addRow([
        t.key,
        t.decl_count      || null,
        t.hesablama       || null,  // Bəy Hes
        t.azalma          || null,  // Bəy Az
        clientNet         || null,  // Bəy Net
        t.kyb_hesablama   || null,  // KYB Hes
        t.kyb_azalma      || null,  // KYB Az
        t.kyb_net         || null,  // KYB Net
        STATUS_LABEL[t.kyb_status], // KYB Status
        t.syb_hesablama   || null,  // SYB Hes
        t.syb_azalma      || null,  // SYB Az
        t.syb_net         || null,  // SYB Net
        STATUS_LABEL[t.syb_status], // SYB Status
        t.total_net       || null,  // Cəmi Qalıq
      ]);
      dr.height = 17;

      dr.eachCell({ includeEmpty: true }, (cell, cn) => {
        const isBəy    = cn >= 3  && cn <= 5;
        const isKyb    = cn >= 6  && cn <= 9;
        const isSyb    = cn >= 10 && cn <= 13;
        const isNum    = (isBəy) || (isKyb && cn !== 9) || (isSyb && cn !== 13);
        const isNet    = cn === 14;
        const isKybSt  = cn === 9;
        const isSybSt  = cn === 13;
        const isDecl   = cn === 2;
        const isTax    = cn === 1;

        const bg = isKybSt ? kybBg : isSybSt ? sybBg : rowBg;
        cell.fill      = xFill(bg);
        cell.border    = brd('thin');
        cell.alignment = {
          horizontal: isNum || isDecl || isNet ? 'right' : (isKybSt || isSybSt) ? 'center' : 'left',
          vertical: 'middle',
        };

        const isBəyNet = cn === 5;
        const isKybNet = cn === 8;
        const isSybNet = cn === 12;
        const fg = isDecl   ? '60A5FA'
          : isNet    ? (t.total_net  < 0 ? C.red    : t.total_net  === 0 ? C.muted : C.text)
          : isBəyNet ? (clientNet    < 0 ? C.red    : clientNet    === 0 ? C.muted : C.text)
          : isKybNet ? (t.kyb_net    < 0 ? C.green  : t.kyb_net    === 0 ? C.muted : C.red)
          : isSybNet ? (t.syb_net    < 0 ? C.green  : t.syb_net    === 0 ? C.muted : C.purple)
          : isKybSt  ? (t.kyb_status === 'active' ? C.red    : t.kyb_status === 'cancelled' ? C.green  : C.muted)
          : isSybSt  ? (t.syb_status === 'active' ? C.purple : t.syb_status === 'cancelled' ? C.green  : C.muted)
          : C.text;

        const isBold = isNet || isTax || isBəyNet || isKybNet || isSybNet;
        cell.font = xFont(fg, isBold, 10);
        if (isNum || isNet || isBəyNet || isKybNet || isSybNet) cell.numFmt = NUM_FMT;
        if (isDecl) cell.numFmt = NUM_FMT_INT;
      });
    });

    // Spacer
    const blank = ws.addRow([]); blank.height = 8;
    blank.eachCell({ includeEmpty: true }, c => { c.fill = xFill(C.bgDark); });

    // Summary block
    const kybTotal = data.kybActive.reduce((s, t) => s + t.kyb_net, 0);
    const sybTotal = data.sybActive.reduce((s, t) => s + t.syb_net, 0);
    [
      ['Cəmi ödənməli borc', data.totalDebt,        data.totalDebt > 0        ? C.red    : C.green],
      ['Aktiv KYB sayı',     data.kybActive.length,  data.kybActive.length > 0 ? C.amber  : C.green],
      ['Aktiv KYB məbləği',  kybTotal,               kybTotal > 0              ? C.red    : C.green],
      ['Aktiv SYB sayı',     data.sybActive.length,  data.sybActive.length > 0 ? C.purple : C.green],
      ['Aktiv SYB məbləği',  sybTotal,               sybTotal > 0              ? C.purple : C.green],
    ].forEach(([lbl, val, vc]) => {
      const sr = ws.addRow([lbl, val]); sr.height = 17;
      Object.assign(sr.getCell(1), {
        font:      xFont(C.text, true),
        fill:      xFill(C.bgMid),
        alignment: { vertical: 'middle' },
      });
      Object.assign(sr.getCell(2), {
        font:      xFont(vc, true),
        fill:      xFill(C.bgMid),
        alignment: { horizontal: 'right', vertical: 'middle' },
        numFmt:    NUM_FMT,
        border:    brd('thin'),
      });
    });
  }

  // ── 5.3 Sheet 2: Original Statement ──────────────────────────
  function buildSheet2_Original(wb, data) {
    const ws = wb.addWorksheet('Orijinal', {
      properties: { tabColor: { argb: 'FF64748B' } },
      views: [{ state: 'frozen', ySplit: 2 }],
    });

    // Header rows
    ws.mergeCells('A1:E1');
    const s2r1 = ws.getRow(1); s2r1.height = 20;
    Object.assign(s2r1.getCell(1), {
      value:     `${data.companyName}  |  VÖEN: ${data.voen}`,
      font:      xFont(C.text, true, 12),
      fill:      xFill(C.bgMid),
      alignment: { vertical: 'middle' },
    });

    const colHeaders = ['Yazılış tarixi','Əməliyyat adı','Əməliyyat növü','','Miqdar (Manat)'];
    ws.columns = [
      { width: 16 }, { width: 45 }, { width: 14 }, { width: 14 }, { width: 16 },
    ];

    const hr = ws.addRow(colHeaders); hr.height = 17;
    hr.eachCell(c => {
      c.font  = xFont(C.text, true);
      c.fill  = xFill(C.bgLight);
      c.alignment = { horizontal: 'center', vertical: 'middle' };
      c.border = { bottom: { style: 'medium', color: { argb: 'FF' + C.border } } };
    });

    // Data
    data.rawRows.forEach((r, i) => {
      const dr = ws.addRow([r.date, r.opName, r.opType, r.col3, r.amount || null]);
      dr.height = 16;
      dr.eachCell({ includeEmpty: true }, (cell, cn) => {
        const rowBg = i % 2 === 0 ? C.bgDark : C.bgMid;
        cell.fill  = xFill(rowBg);
        cell.font  = xFont(C.text, false, 10);
        cell.border = { bottom: { style: 'thin', color: { argb: 'FF' + C.border } } };
        if (cn === 1) {
          // Try to parse as date
          const parts = r.date.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
          if (parts) {
            cell.value = new Date(+parts[3], +parts[2]-1, +parts[1]);
            cell.numFmt = 'DD.MM.YYYY';
          }
          cell.alignment = { horizontal: 'center', vertical: 'middle' };
        }
        if (cn === 5) {
          cell.numFmt   = NUM_FMT;
          cell.alignment = { horizontal: 'right', vertical: 'middle' };
        }
        if (cn === 2 || cn === 3) {
          cell.alignment = { vertical: 'middle' };
        }
      });
    });

    // Auto-width for col 2 (opName is long, but cap at 55)
    ws.getColumn(2).width = Math.min(55,
      data.rawRows.reduce((max, r) => Math.max(max, (r.opName || '').length), 20));
  }

  // ── 5.4 ExcelJS helpers ───────────────────────────────────────
  function xFill(hex) {
    return { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + hex } };
  }
  function xFont(color, bold, size) {
    return { name: 'Arial', size: size || 10, bold: !!bold, color: { argb: 'FF' + color } };
  }
  return { download };
})();

// Format number → colored HTML span
function fmt(n) {
  if (n === 0) return '<span class="num-zero">—</span>';
  const s = Math.abs(n).toLocaleString('az-AZ', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return n < 0
    ? `<span class="num-neg">-${s}</span>`
    : `<span class="num-pos">${s}</span>`;
}

// Format number → plain string (for alerts, XLSX)
function fmtRaw(n) {
  return Math.abs(n).toLocaleString('az-AZ', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// HTML-escape to prevent XSS when inserting company names etc.
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── XML Drag & Drop ───────────────────────────────────────────
(function initXmlDropZone() {
  const dz = document.getElementById('xmlDropZone');
  const fi = document.getElementById('xmlFileInput');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) handleXml(f); });
  fi.addEventListener('change', e => { if (e.target.files[0]) handleXml(e.target.files[0]); });
})();

function handleXml(file) {
  document.getElementById('xmlSpinner').style.display = 'block';
  document.getElementById('xmlErrorBox').style.display = 'none';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = XmlParser.parse(e.target.result);
      XmlRenderer.render(data);
      window._xmlData = data;
    } catch(err) {
      const eb = document.getElementById('xmlErrorBox');
      eb.textContent = 'XML xətası: ' + err.message;
      eb.style.display = 'block';
      console.error(err);
    }
    document.getElementById('xmlSpinner').style.display = 'none';
  };
  reader.readAsText(file, 'UTF-8');
}

// ── XML Parser ────────────────────────────────────────────────
const XmlParser = (() => {
  function parse(xmlText) {
    const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
    const get  = tag => doc.querySelector(tag)?.textContent?.trim() || '';
    const getN = tag => parseFloat(get(tag)) || 0;

    const vergiNo     = get('vergiNo');
    const adi         = get('adi');
    const yil         = get('yil');
    const ay          = get('ay');
    const donem       = ay ? `${yil}/${ay.padStart(2,'0')}` : yil;
    const beyannameTipi = get('beyannameTipi') === '0' ? 'Cari' : 'Dəqiqləşdirilmiş';
    const budce       = getN('budceyeOdenilmeli');
    const faaliyetAdi = get('faaliyetNovuAdi');
    const umidsizBorc = getN('umidsizBorcCemi');

    const allData = {};

    // Sadə seksiyalar: <gosterici> + <mebleg>
    for (const sec of ['vergiHesab','bagliHarc','hesabatDovruVergiHesab1','hesabatDovruVergiHesab2','hesabatDovruVergiHesab']) {
      for (const row of doc.querySelectorAll(`${sec} row`)) {
        const kod    = row.querySelector('gosterici')?.textContent?.trim();
        const mebleg = parseFloat(row.querySelector('mebleg')?.textContent) || 0;
        if (kod && !allData[kod]) allData[kod] = { mebleg };
      }
    }

    // Aktivlər (Əlavə 1) — 4 sütun
    for (const row of doc.querySelectorAll('aktivler row')) {
      const kod = row.querySelector('gosterici')?.textContent?.trim();
      if (!kod) continue;
      allData['A_'+kod] = {
        evvel:  parseFloat(row.querySelector('hesabatDovruEvveline')?.textContent) || 0,
        dahil:  parseFloat(row.querySelector('dahilOlunan')?.textContent)          || 0,
        takdim: parseFloat(row.querySelector('takdimEdilen')?.textContent)         || 0,
        son:    parseFloat(row.querySelector('hesabatDovruSonuna')?.textContent)   || 0,
      };
    }

    // Kapital & Öhdəliklər (Əlavə 1) — 5 sütun
    for (const row of doc.querySelectorAll('kapitalEhtiyatlar row')) {
      const kod = row.querySelector('gosterici')?.textContent?.trim();
      if (!kod) continue;
      allData['K_'+kod] = {
        evvel:  parseFloat(row.querySelector('hesabatDovruEvveline')?.textContent) || 0,
        dahil:  parseFloat(row.querySelector('dahilOlunan')?.textContent)          || 0,
        takdim: parseFloat(row.querySelector('takdimEdilen')?.textContent)         || 0,
        silen:  parseFloat(row.querySelector('silinen')?.textContent)              || 0,
        son:    parseFloat(row.querySelector('hesabatDovruSonuna')?.textContent)   || 0,
      };
    }

    return { vergiNo, adi, donem, beyannameTipi, budce, faaliyetAdi, umidsizBorc, allData };
  }
  return { parse };
})();

// ── XML Renderer ──────────────────────────────────────────────
const XmlRenderer = (() => {
  function fmtN(n) {
    if (n === 0) return '<span class="num-zero">—</span>';
    const f = Math.abs(n).toLocaleString('az-AZ',{minimumFractionDigits:2,maximumFractionDigits:2});
    return n < 0 ? `<span class="num-neg">${f}</span>` : `<span class="num-pos">${f}</span>`;
  }

  // 3 sütun: Bəyannamə kodu | XML kodu | Ad | Məbləğ
  function simpleTable(codes, data) {
    const rows = codes
      .filter(c => data.allData[c] && data.allData[c].mebleg !== undefined)
      .map(c => {
        const v    = data.allData[c].mebleg;
        const info = mvInfo(c);
        const bold = ['1042','1056','3003','1001','1041'].includes(c) ? 'style="font-weight:700"' : '';
        return `<tr ${bold}>
          <td style="text-align:center;font-family:var(--mono);font-size:11px;color:var(--accent)">${esc(info.beyCode)}</td>
          <td style="text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted)">${c}</td>
          <td style="text-align:left;font-family:var(--sans);font-size:13px">${esc(info.label)}</td>
          <td>${fmtN(v)}</td>
        </tr>`;
      });
    if (!rows.length) return '';
    return `<div class="table-wrap"><table>
      <thead><tr>
        <th style="text-align:center">Bəy. kodu</th>
        <th style="text-align:center">XML kodu</th>
        <th style="text-align:left">Göstərici adı</th>
        <th>Məbləğ (₼)</th>
      </tr></thead>
      <tbody>${rows.join('')}</tbody></table></div>`;
  }

  // Aktivlər — 6 sütun
  function aktivTable(keys, data) {
    const rows = keys.map(k => {
      const kod  = k.slice(2);
      const d    = data.allData[k];
      const info = mvInfo(kod);
      return `<tr>
        <td style="text-align:center;font-family:var(--mono);font-size:11px;color:var(--accent)">${esc(info.beyCode)}</td>
        <td style="text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted)">${kod}</td>
        <td style="text-align:left;font-family:var(--sans);font-size:13px">${esc(info.label)}</td>
        <td>${fmtN(d.evvel)}</td><td>${fmtN(d.dahil)}</td><td>${fmtN(d.takdim)}</td><td>${fmtN(d.son)}</td>
      </tr>`;
    });
    if (!rows.length) return '';
    return `<div class="table-wrap"><table>
      <thead><tr>
        <th style="text-align:center">Bəy. kodu</th>
        <th style="text-align:center">XML kodu</th>
        <th style="text-align:left">Göstərici adı</th>
        <th>Dövrün əvvəlinə</th><th>Daxil olmuşdur</th><th>Təqdim edilmişdir</th><th>Dövrün sonuna</th>
      </tr></thead>
      <tbody>${rows.join('')}</tbody></table></div>`;
  }

  // Kapital — 7 sütun
  function kapTable(keys, data) {
    const rows = keys.map(k => {
      const kod  = k.slice(2);
      const d    = data.allData[k];
      const info = mvInfo(kod);
      return `<tr>
        <td style="text-align:center;font-family:var(--mono);font-size:11px;color:var(--accent)">${esc(info.beyCode)}</td>
        <td style="text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted)">${kod}</td>
        <td style="text-align:left;font-family:var(--sans);font-size:13px">${esc(info.label)}</td>
        <td>${fmtN(d.evvel)}</td><td>${fmtN(d.dahil)}</td><td>${fmtN(d.takdim)}</td><td>${fmtN(d.silen||0)}</td><td>${fmtN(d.son)}</td>
      </tr>`;
    });
    if (!rows.length) return '';
    return `<div class="table-wrap"><table>
      <thead><tr>
        <th style="text-align:center">Bəy. kodu</th>
        <th style="text-align:center">XML kodu</th>
        <th style="text-align:left">Göstərici adı</th>
        <th>Dövrün əvvəlinə</th><th>Daxil olmuşdur</th><th>Təqdim edilmişdir</th><th>Silinmişdir</th><th>Dövrün sonuna</th>
      </tr></thead>
      <tbody>${rows.join('')}</tbody></table></div>`;
  }

  function render(data) {
    document.getElementById('xml-drop-section').style.display = 'none';
    const el = document.getElementById('xml-results');
    el.style.display = 'block';

    const gelir = data.allData['1001']?.mebleg || 0;
    const xrc   = data.allData['1041']?.mebleg || 0;
    const mv    = data.allData['1042']?.mebleg || 0;

    const aktivKeys = Object.keys(data.allData).filter(k => k.startsWith('A_')).sort();
    const kapKeys   = Object.keys(data.allData).filter(k => k.startsWith('K_')).sort();

    const sections = [
      { title:'💰 Gəlirlər',                      codes:['1001','1002','1012','1013','1016'] },
      { title:'📉 Xərclər',                        codes:['1021','1022','1023','1102','1106','1031','1034','1006','1041','1042','1045','1056','1076'] },
      { title:'🧾 Vergi hesabı (hesabat dövrü)',   codes:['3001','3002','3003','3004'] },
      { title:'🏦 Balans — Aktivlər',              codes:['2001','2002','2003','2004','2005','2007','2008','1200','2009','2011','2012','2014','2016','2018','2019'] },
      { title:'📋 Balans — Öhdəliklər & Kapital',  codes:['2020','2021','2022','2023','2027','2031','2033','2034','2039','2140','2040','2043','2049','2050','2052','2053','2057','2062'] },
      { title:'🔄 Gəlir/Xərc dövriyyəsi',         codes:['2063','2064','2066','2071','2073'] },
    ];

    let html = `
      <div class="company-card">
        <div>
          <div class="company-name">${esc(data.adi)}</div>
          <div class="company-voen">VÖEN: ${esc(data.vergiNo)} · ${esc(data.faaliyetAdi)}</div>
        </div>
        <div class="company-period">
          <div>Dövr: ${esc(data.donem)}</div>
          <div style="margin-top:2px">Bəyannamə: ${esc(data.beyannameTipi)}</div>
        </div>
      </div>
      <div class="summary-row">
        <div class="chip"><div class="chip-label">Büdcəyə ödənilməli</div><div class="chip-value ${data.budce>0?'danger':'ok'}">${data.budce.toLocaleString('az-AZ',{minimumFractionDigits:2})} ₼</div></div>
        <div class="chip"><div class="chip-label">Cəmi gəlir</div><div class="chip-value ok">${gelir.toLocaleString('az-AZ',{minimumFractionDigits:2})} ₼</div></div>
        <div class="chip"><div class="chip-label">Cəmi xərclər</div><div class="chip-value">${xrc.toLocaleString('az-AZ',{minimumFractionDigits:2})} ₼</div></div>
        <div class="chip"><div class="chip-label">Vergiyə cəlb olunan mənfəət</div><div class="chip-value ${mv>0?'ok':'danger'}">${mv.toLocaleString('az-AZ',{minimumFractionDigits:2})} ₼</div></div>
        <div class="chip"><div class="chip-label">Ümidsiz borc</div><div class="chip-value ${data.umidsizBorc>0?'danger':'ok'}">${data.umidsizBorc.toLocaleString('az-AZ',{minimumFractionDigits:2})} ₼</div></div>
      </div>`;

    for (const sec of sections) {
      const tbl = simpleTable(sec.codes, data);
      if (tbl) html += `<div class="section-title">${sec.title}</div>${tbl}`;
    }
    if (aktivKeys.length) html += `<div class="section-title">📦 Aktivlər (Əlavə 1)</div>${aktivTable(aktivKeys, data)}`;
    if (kapKeys.length)   html += `<div class="section-title">🏛️ Kapital & Öhdəliklər (Əlavə 1)</div>${kapTable(kapKeys, data)}`;

    html += `<div class="action-row">
      <button class="btn btn-primary" onclick="XmlExporter.download(window._xmlData)">⬇ XLSX yüklə</button>
      <button class="btn btn-secondary" onclick="XmlRenderer.reset()">↩ Yeni XML</button>
    </div>`;

    el.innerHTML = html;
  }

  function reset() {
    document.getElementById('xml-drop-section').style.display = 'flex';
    document.getElementById('xml-results').style.display = 'none';
    document.getElementById('xmlFileInput').value = '';
  }

  return { render, reset };
})();

// ── XML XLSX Exporter ─────────────────────────────────────────
const XmlExporter = (() => {
  async function download(data) {
    const btn = document.querySelector('#xml-results .btn-primary');
    btn.innerHTML = '⏳ Hazırlanır...'; btn.disabled = true;
    try {
      const wb     = new ExcelJS.Workbook();
      const numFmt = '#,##0.00;[Red]-#,##0.00;"-"';
      const fl  = hex => ({ type:'pattern', pattern:'solid', fgColor:{ argb:'FF'+hex } });
      const fn  = (hex,bold,sz) => ({ name:'Arial', size:sz||10, bold:!!bold, color:{ argb:'FF'+hex } });
      const aL  = () => ({ horizontal:'left',   vertical:'middle' });
      const aR  = () => ({ horizontal:'right',  vertical:'middle' });
      const aC  = () => ({ horizontal:'center', vertical:'middle' });
      const brd = () => { const s={style:'thin',color:{argb:'FFD1D5DB'}}; return {top:s,bottom:s,left:s,right:s}; };

      // ── Sheet 1: MV Göstəriciləri ─────────────────────────────
      // Sütunlar: Bəy.kodu | XML kodu | Göstərici adı | Məbləğ
      const ws1 = wb.addWorksheet('MV Göstəriciləri', {
        properties:{ tabColor:{ argb:'FF3B82F6' } },
        views:[{state:'frozen',ySplit:5}]
      });
      ws1.columns = [{ width:12 },{ width:10 },{ width:52 },{ width:20 }];

      ws1.mergeCells('A1:D1');
      Object.assign(ws1.getRow(1).getCell(1), { value:data.adi, font:fn('1E3A5F',true,13), fill:fl('DBEAFE'), alignment:aL() });
      ws1.getRow(1).height = 22;

      ws1.mergeCells('A2:D2');
      Object.assign(ws1.getRow(2).getCell(1), {
        value:`VÖEN: ${data.vergiNo}   |   Dövr: ${data.donem}   |   Bəyannamə: ${data.beyannameTipi}   |   ${data.faaliyetAdi}`,
        font:fn('6B7280',false,9), fill:fl('EFF6FF'), alignment:aL(),
      });
      ws1.getRow(2).height = 14;

      const gelir = data.allData['1001']?.mebleg || 0;
      const xrc   = data.allData['1041']?.mebleg || 0;
      const mv    = data.allData['1042']?.mebleg || 0;
      ws1.mergeCells('A3:D3');
      Object.assign(ws1.getRow(3).getCell(1), {
        value:`Gəlir: ${gelir.toLocaleString('az-AZ',{minimumFractionDigits:2})} ₼   |   Xərclər: ${xrc.toLocaleString('az-AZ',{minimumFractionDigits:2})} ₼   |   Mənfəət: ${mv.toLocaleString('az-AZ',{minimumFractionDigits:2})} ₼   |   Büdcəyə: ${data.budce.toLocaleString('az-AZ',{minimumFractionDigits:2})} ₼`,
        font:fn(data.budce>0?'B45309':'065F46',true,10), fill:fl(data.budce>0?'FEF3C7':'D1FAE5'), alignment:aL(),
      });
      ws1.getRow(3).height = 18;
      ws1.getRow(4).height = 8;

      // Header
      const hr = ws1.getRow(5); hr.height = 17;
      ['Bəy. kodu','XML kodu','Göstərici adı','Məbləğ (₼)'].forEach((v,i) => {
        const c = hr.getCell(i+1);
        c.value=v; c.font=fn('FFFFFF',true,10); c.fill=fl('1D4ED8');
        c.alignment = i===3?aR():i<2?aC():aL(); c.border=brd();
      });

      const KEY_CODES = new Set(['1001','1041','1042','1056','3003']);
      const simpleSecs = [
        { title:'GƏLİRLƏR',               codes:['1001','1002','1012','1013','1016'] },
        { title:'XƏRCLƏR',                 codes:['1021','1022','1023','1102','1106','1031','1034','1006','1041','1042','1045','1056','1076'] },
        { title:'VERGİ HESABI',            codes:['3001','3002','3003','3004'] },
        { title:'BALANS — AKTİVLƏR',       codes:['2001','2002','2003','2004','2005','2007','2008','1200','2009','2011','2012','2014','2016','2018','2019'] },
        { title:'BALANS — ÖHDƏLİKLƏR & KAPİTAL', codes:['2020','2021','2022','2023','2027','2031','2033','2034','2039','2140','2040','2043','2049','2050','2052','2053','2057','2062'] },
        { title:'GƏLİR/XƏRC DÖVRİYYƏSİ', codes:['2063','2064','2066','2071','2073'] },
      ];
      let ri = 6;
      for (const sec of simpleSecs) {
        ws1.mergeCells(`A${ri}:D${ri}`);
        Object.assign(ws1.getRow(ri).getCell(1), { value:sec.title, font:fn('1E40AF',true,9), fill:fl('EFF6FF'), alignment:aL() });
        ws1.getRow(ri).height = 15; ri++;
        for (const c of sec.codes) {
          if (!data.allData[c] || data.allData[c].mebleg===undefined) continue;
          const v    = data.allData[c].mebleg;
          const info = mvInfo(c);
          const isKey = KEY_CODES.has(c);
          const dr = ws1.getRow(ri++); dr.height = 16;
          [info.beyCode, c, info.label, v].forEach((val,ci) => {
            const cell = dr.getCell(ci+1);
            cell.value=val; cell.border=brd();
            cell.fill=fl(isKey?'FFF7ED':(ri%2===0?'F9FAFB':'FFFFFF'));
            cell.alignment = ci===3?aR():ci<2?aC():aL();
            if (ci===0) cell.font=fn('1D4ED8',true,10);
            else if (ci===1) cell.font=fn('6B7280',false,9);
            else cell.font=fn(isKey?'92400E':'111827',isKey,10);
            if (ci===3) cell.numFmt=numFmt;
          });
        }
        ri++;
      }

      // ── Sheet 2: Aktivlər ─────────────────────────────────────
      // Sütunlar: Bəy.kodu | XML kodu | Ad | dövrEvvəl | dahil | takdim | son
      const ws2 = wb.addWorksheet('Aktivlər (Əlavə 1)', { properties:{ tabColor:{ argb:'FF10B981' } } });
      ws2.columns = [{ width:12 },{ width:10 },{ width:52 },{ width:18 },{ width:18 },{ width:18 },{ width:18 }];
      ws2.mergeCells('A1:G1');
      Object.assign(ws2.getRow(1).getCell(1), { value:`${data.adi}  |  Aktivlər (Əlavə №1)  |  ${data.donem}`, font:fn('065F46',true,12), fill:fl('D1FAE5'), alignment:aL() });
      ws2.getRow(1).height = 20;
      const h2 = ws2.getRow(2); h2.height = 17;
      ['Bəy. kodu','XML kodu','Göstərici adı','Dövrün əvvəlinə','Daxil olmuşdur','Təqdim edilmişdir','Dövrün sonuna'].forEach((v,i) => {
        const c=h2.getCell(i+1); c.value=v; c.font=fn('FFFFFF',true,10); c.fill=fl('065F46');
        c.alignment=i>2?aR():i<2?aC():aL(); c.border=brd();
      });
      let r2=3;
      for (const k of Object.keys(data.allData).filter(k=>k.startsWith('A_')).sort()) {
        const kod=k.slice(2); const d=data.allData[k]; const info=mvInfo(kod);
        const dr=ws2.getRow(r2++); dr.height=16;
        [info.beyCode,kod,info.label,d.evvel,d.dahil,d.takdim,d.son].forEach((v,ci)=>{
          const cell=dr.getCell(ci+1); cell.value=v; cell.border=brd();
          cell.fill=fl(r2%2===0?'F0FDF4':'FFFFFF');
          cell.alignment=ci>2?aR():ci<2?aC():aL();
          if(ci===0) cell.font=fn('1D4ED8',true,10);
          else if(ci===1) cell.font=fn('6B7280',false,9);
          else cell.font=fn('111827',false,10);
          if(ci>2) cell.numFmt=numFmt;
        });
      }

      // ── Sheet 3: Kapital & Öhdəliklər ────────────────────────
      // Sütunlar: Bəy.kodu | XML kodu | Ad | evvəl | dahil | takdim | silen | son
      const ws3 = wb.addWorksheet('Kapital & Öhdəliklər', { properties:{ tabColor:{ argb:'FFF59E0B' } } });
      ws3.columns = [{ width:12 },{ width:10 },{ width:52 },{ width:18 },{ width:18 },{ width:18 },{ width:18 },{ width:18 }];
      ws3.mergeCells('A1:H1');
      Object.assign(ws3.getRow(1).getCell(1), { value:`${data.adi}  |  Kapital & Öhdəliklər (Əlavə №1)  |  ${data.donem}`, font:fn('78350F',true,12), fill:fl('FEF3C7'), alignment:aL() });
      ws3.getRow(1).height = 20;
      const h3=ws3.getRow(2); h3.height=17;
      ['Bəy. kodu','XML kodu','Göstərici adı','Dövrün əvvəlinə','Daxil olmuşdur','Təqdim edilmişdir','Silinmişdir','Dövrün sonuna'].forEach((v,i)=>{
        const c=h3.getCell(i+1); c.value=v; c.font=fn('FFFFFF',true,10); c.fill=fl('B45309');
        c.alignment=i>2?aR():i<2?aC():aL(); c.border=brd();
      });
      let r3=3;
      for (const k of Object.keys(data.allData).filter(k=>k.startsWith('K_')).sort()) {
        const kod=k.slice(2); const d=data.allData[k]; const info=mvInfo(kod);
        const dr=ws3.getRow(r3++); dr.height=16;
        [info.beyCode,kod,info.label,d.evvel,d.dahil,d.takdim,d.silen||0,d.son].forEach((v,ci)=>{
          const cell=dr.getCell(ci+1); cell.value=v; cell.border=brd();
          cell.fill=fl(r3%2===0?'FFFBEB':'FFFFFF');
          cell.alignment=ci>2?aR():ci<2?aC():aL();
          if(ci===0) cell.font=fn('1D4ED8',true,10);
          else if(ci===1) cell.font=fn('6B7280',false,9);
          else cell.font=fn('111827',false,10);
          if(ci>2) cell.numFmt=numFmt;
        });
      }

      const buffer = await wb.xlsx.writeBuffer();
      const blob = new Blob([buffer], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href=url; a.download=`mv_beyanname_${data.vergiNo}_${data.donem.replace('/','_')}.xlsx`; a.click();
      URL.revokeObjectURL(url);
    } finally {
      btn.innerHTML='⬇ XLSX yüklə'; btn.disabled=false;
    }
  }
  return { download };
})();
</script>
</body>
</html>
